# Pre-commit hooks for socialhome/core.
#
# Install:   pip install pre-commit && pre-commit install
# Run once:  pre-commit run --all-files
#
# ruff + mypy run repo-wide (not just on staged files) so local hooks
# match the CI scope. Without this, pre-existing failures in unrelated
# files slip through commits and fail CI after push. The cost is a
# ~5–10 s tree scan per commit, which is acceptable.

default_language_version:
  python: python3.14

repos:
  # ── Hygiene ────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: detect-private-key

  # ── Python lint + format via ruff ──────────────────────────────────────
  # Run repo-wide (always_run + pass_filenames: false) so pre-commit
  # matches CI's `ruff check .` / `ruff format --check .` scope.
  #
  # Keep ``rev`` in sync with the ruff version CI's `pip install -e .[dev]`
  # resolves — ruff's format rules change between minors, so a stale
  # pin silently diverges from CI and lets format violations slip
  # through until they fail on the push. Bump via
  # ``pre-commit autoupdate --repo https://github.com/astral-sh/ruff-pre-commit``.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        name: ruff (lint, repo-wide)
        args: ["--fix", "."]
        always_run: true
        pass_filenames: false
      - id: ruff-format
        name: ruff (format, repo-wide)
        args: ["."]
        always_run: true
        pass_filenames: false

  # ── Python type-check via mypy ─────────────────────────────────────────
  # Run mypy from the developer's own venv (``language: system``) so it
  # sees the real runtime deps installed by ``pip install -e .[dev]`` —
  # no need to mirror the project's dependency list into an isolated
  # pre-commit env. Scope matches CI's ``mypy socialhome/``.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (socialhome, repo-wide)
        entry: mypy --config-file=pyproject.toml socialhome/
        language: system
        pass_filenames: false
        always_run: true

  # ── Frontend: lint + typecheck + build ─────────────────────────────────
  # A local hook so pre-commit reuses the repo's pnpm install; CI still
  # runs the same commands via `.github/workflows/ci.yml`.
  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend — eslint
        language: system
        entry: bash -c 'cd client && pnpm run lint'
        pass_filenames: false
        files: ^client/.*\.(ts|tsx|js|jsx)$

      - id: frontend-typecheck
        name: frontend — tsc --noEmit
        language: system
        entry: bash -c 'cd client && pnpm run typecheck'
        pass_filenames: false
        files: ^client/.*\.(ts|tsx)$

      - id: frontend-build
        name: frontend — vite build
        language: system
        stages: [pre-push]
        entry: bash -c 'cd client && pnpm run build'
        pass_filenames: false
        files: ^client/.*\.(ts|tsx|css|html|json)$

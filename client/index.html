<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <!-- Theme colours match tokens.css: paper (light) / paper-deep dark (dark). -->
  <meta name="theme-color" content="#F4ECE0" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#161821" media="(prefers-color-scheme: dark)" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <title>Social Home</title>
  <!--
    Pre-paint theme bootstrap. Runs synchronously before any module
    bundle, so the `<html>` class matches the user's stored or
    system preference on the very first paint — no light→dark flash
    on reload. The matching effect in @/store/theme.ts takes over
    once the SPA mounts.
  -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('sh_theme') || 'auto';
        var dark = t === 'dark' ||
          (t === 'auto' &&
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.add(
          dark ? 'sh-theme-dark' : 'sh-theme-light'
        );
      } catch (e) { /* sandboxed / no-storage — silently fall back */ }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>

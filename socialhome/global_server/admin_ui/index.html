<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GFS Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    body {
      font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
      margin: 0; color: #1f2937; background: #f9fafb;
    }
    header {
      background: #111827; color: #fff; padding: 14px 22px;
      display: flex; align-items: center; gap: 16px;
    }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header .right { margin-left: auto; font-size: 13px; }
    nav {
      display: flex; gap: 2px; background: #fff; padding: 8px 22px;
      border-bottom: 1px solid #e5e7eb;
    }
    nav a {
      padding: 8px 14px; border-radius: 6px; color: #374151;
      text-decoration: none; font-weight: 500;
    }
    nav a.active { background: #1f2937; color: #fff; }
    main { padding: 22px; max-width: 1100px; margin: 0 auto; }
    section { background: #fff; padding: 18px 22px; border-radius: 8px;
      border: 1px solid #e5e7eb; margin-bottom: 18px; }
    h2 { margin: 0 0 14px 0; font-size: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .card {
      background: #f3f4f6; padding: 16px; border-radius: 6px;
    }
    .card .val { font-size: 28px; font-weight: 700; margin-top: 6px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #eef2f7; }
    th { background: #f3f4f6; font-weight: 600; font-size: 13px; color: #374151; }
    button, input, select, textarea {
      font: inherit; padding: 6px 12px; border: 1px solid #d1d5db;
      border-radius: 6px; background: #fff;
    }
    button { cursor: pointer; }
    button.primary   { background: #6366f1; color: #fff; border-color: #6366f1; }
    button.danger    { background: #ef4444; color: #fff; border-color: #ef4444; }
    button.secondary { background: #f3f4f6; }
    .row-actions button { margin-left: 6px; }
    .muted { color: #6b7280; font-size: 13px; }
    .error { color: #b91c1c; }
    .hidden { display: none !important; }
    .login { max-width: 380px; margin: 80px auto; }
    .login h2 { margin-bottom: 16px; }
    .login label { display: block; margin-bottom: 12px; font-weight: 500; }
    .login input { display: block; width: 100%; margin-top: 4px; }
    .field { display: block; margin-bottom: 12px; }
    .field label { display: block; margin-bottom: 4px; font-weight: 500; }
    .field input, .field textarea, .field select { width: 100%; }
    textarea { min-height: 110px; font-family: inherit; }
    .pill { display: inline-block; padding: 1px 8px; border-radius: 999px;
            font-size: 12px; background: #e5e7eb; color: #374151; }
    .pill.banned  { background: #fee2e2; color: #991b1b; }
    .pill.pending { background: #fef3c7; color: #92400e; }
    .pill.active  { background: #dcfce7; color: #166534; }
    .audit-row { font-size: 13px; padding: 6px 0; border-bottom: 1px solid #eef2f7; }
    .audit-row time { color: #6b7280; font-size: 12px; }
  </style>
</head>
<body>

<div id="login" class="login hidden">
  <h2>GFS Admin</h2>
  <label>Password
    <input id="login-pw" type="password" autocomplete="current-password" autofocus />
  </label>
  <button class="primary" onclick="submitLogin()">Sign in</button>
  <p id="login-err" class="error" style="margin-top:10px"></p>
</div>

<div id="app" class="hidden">
  <header>
    <h1>GFS Admin</h1>
    <span id="hdr-name" class="muted"></span>
    <div class="right">
      <button class="secondary" onclick="logout()">Log out</button>
    </div>
  </header>

  <nav id="nav"></nav>

  <main>
    <section id="view-overview"></section>
    <section id="view-clients"  class="hidden"></section>
    <section id="view-spaces"   class="hidden"></section>
    <section id="view-reports"  class="hidden"></section>
    <section id="view-appeals"  class="hidden"></section>
    <section id="view-policy"   class="hidden"></section>
    <section id="view-branding" class="hidden"></section>
    <section id="view-audit"    class="hidden"></section>
  </main>
</div>

<script>
const TABS = [
  ["overview",  "Overview"],
  ["clients",   "Clients"],
  ["spaces",    "Spaces"],
  ["reports",   "Reports"],
  ["appeals",   "Appeals"],
  ["policy",    "Policy"],
  ["branding",  "Branding"],
  ["audit",     "Audit log"],
];

function $(id){ return document.getElementById(id); }
function hide(el){ el.classList.add('hidden'); }
function show(el){ el.classList.remove('hidden'); }

async function api(method, path, body) {
  const opts = { method, credentials: "same-origin",
                 headers: { "Content-Type": "application/json" } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const resp = await fetch(path, opts);
  if (resp.status === 401) {
    showLogin("Session expired — sign in again.");
    throw new Error("unauthorized");
  }
  const text = await resp.text();
  if (!resp.ok) {
    let msg = "HTTP " + resp.status;
    try { msg = JSON.parse(text).detail || msg; } catch {}
    throw new Error(msg);
  }
  return text ? JSON.parse(text) : {};
}

function showLogin(err) {
  hide($("app")); show($("login"));
  $("login-err").textContent = err || "";
}

async function submitLogin() {
  $("login-err").textContent = "";
  const pw = $("login-pw").value;
  try {
    const resp = await fetch("/admin/login", {
      method: "POST", credentials: "same-origin",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pw }),
    });
    const data = await resp.json().catch(() => ({}));
    if (resp.status === 503) {
      $("login-err").textContent =
        "Admin is disabled until --set-password is run on the server.";
      return;
    }
    if (resp.status === 429) {
      $("login-err").textContent =
        "Too many failed attempts — wait 15 minutes.";
      return;
    }
    if (!resp.ok || data.status !== "ok") {
      $("login-err").textContent = "Invalid password.";
      return;
    }
    $("login-pw").value = "";
    bootApp();
  } catch (e) {
    $("login-err").textContent = e.message || "Login failed.";
  }
}

async function logout() {
  try { await fetch("/admin/logout", { method: "POST",
                                        credentials: "same-origin" }); }
  catch {}
  showLogin();
}

function renderNav(current) {
  const nav = $("nav");
  nav.innerHTML = "";
  TABS.forEach(([id, label]) => {
    const a = document.createElement("a");
    a.href = "#" + id;
    a.textContent = label;
    if (id === current) a.classList.add("active");
    a.onclick = (e) => { e.preventDefault(); openTab(id); };
    nav.appendChild(a);
  });
}

function openTab(id) {
  TABS.forEach(([t]) => hide($("view-" + t)));
  show($("view-" + id));
  renderNav(id);
  if (window.location.hash !== "#" + id) window.location.hash = "#" + id;
  loaders[id]();
}

async function bootApp() {
  hide($("login")); show($("app"));
  try {
    const br = await api("GET", "/admin/api/branding");
    $("hdr-name").textContent = br.server_name || "";
  } catch {}
  const tab = (window.location.hash || "#overview").slice(1);
  openTab(TABS.some(t => t[0] === tab) ? tab : "overview");
}

function pill(status) {
  const cls = ["active", "pending", "banned"].includes(status)
    ? status : "pending";
  return `<span class="pill ${cls}">${status}</span>`;
}

const loaders = {
  async overview() {
    const v = $("view-overview");
    v.innerHTML = `<h2>Overview</h2><div class="grid-3" id="ov"></div>`;
    const data = await api("GET", "/admin/api/overview");
    $("ov").innerHTML = `
      <div class="card"><div>Clients active</div>
        <div class="val">${data.clients.active}</div>
        <div class="muted">${data.clients.pending} pending</div></div>
      <div class="card"><div>Spaces active</div>
        <div class="val">${data.spaces.active}</div>
        <div class="muted">${data.spaces.pending} pending</div></div>
      <div class="card"><div>Open reports</div>
        <div class="val">${data.open_reports}</div></div>`;
  },

  async clients() {
    const v = $("view-clients");
    v.innerHTML = `<h2>Clients</h2>
      <div style="margin-bottom:10px">
        <button class="secondary" onclick="loaders.clients_filter('')">All</button>
        <button class="secondary" onclick="loaders.clients_filter('active')">Active</button>
        <button class="secondary" onclick="loaders.clients_filter('pending')">Pending</button>
        <button class="secondary" onclick="loaders.clients_filter('banned')">Banned</button>
      </div>
      <table><thead><tr>
        <th>Display</th><th>Instance ID</th><th>Endpoint</th>
        <th>Status</th><th></th></tr></thead>
        <tbody id="clients-tbody"></tbody></table>`;
    await loaders.clients_filter("");
  },
  async clients_filter(status) {
    const qs = status ? "?status=" + encodeURIComponent(status) : "";
    const list = await api("GET", "/admin/api/clients" + qs);
    const tb = $("clients-tbody");
    tb.innerHTML = list.map(c => `
      <tr>
        <td>${c.display_name || "—"}</td>
        <td style="font-family:monospace">${c.instance_id}</td>
        <td><a href="${c.endpoint_url}" rel="noopener">${c.endpoint_url}</a></td>
        <td>${pill(c.status)}</td>
        <td class="row-actions">
          ${c.status === 'pending' ? `<button class="primary" onclick="loaders.client_action('${c.instance_id}','accept')">Accept</button>` : ''}
          ${c.status === 'pending' ? `<button class="secondary" onclick="loaders.client_action('${c.instance_id}','reject')">Reject</button>` : ''}
          ${c.status === 'active'  ? `<button class="danger" onclick="loaders.client_action('${c.instance_id}','ban')">Ban</button>` : ''}
          ${c.status === 'banned'  ? `<button class="secondary" onclick="loaders.client_action('${c.instance_id}','unban')">Unban</button>` : ''}
        </td>
      </tr>`).join("") || `<tr><td colspan="5" class="muted">No clients.</td></tr>`;
  },
  async client_action(id, action) {
    await api("POST", `/admin/api/clients/${encodeURIComponent(id)}/${action}`);
    await loaders.clients_filter("");
  },

  async spaces() {
    const v = $("view-spaces");
    v.innerHTML = `<h2>Spaces</h2>
      <div style="margin-bottom:10px">
        <button class="secondary" onclick="loaders.spaces_filter('')">All</button>
        <button class="secondary" onclick="loaders.spaces_filter('active')">Active</button>
        <button class="secondary" onclick="loaders.spaces_filter('pending')">Pending</button>
        <button class="secondary" onclick="loaders.spaces_filter('banned')">Banned</button>
      </div>
      <table><thead><tr>
        <th>Name</th><th>Owner</th><th>Subs</th>
        <th>Status</th><th></th></tr></thead>
        <tbody id="spaces-tbody"></tbody></table>`;
    await loaders.spaces_filter("");
  },
  async spaces_filter(status) {
    const qs = status ? "?status=" + encodeURIComponent(status) : "";
    const list = await api("GET", "/admin/api/spaces" + qs);
    const tb = $("spaces-tbody");
    tb.innerHTML = list.map(s => `
      <tr>
        <td>${s.name || "—"}<div class="muted">${s.space_id}</div></td>
        <td style="font-family:monospace">${s.owning_instance}</td>
        <td>${s.subscriber_count}</td>
        <td>${pill(s.status)}</td>
        <td class="row-actions">
          ${s.status === 'pending' ? `<button class="primary" onclick="loaders.space_action('${s.space_id}','accept')">Accept</button>` : ''}
          ${s.status === 'pending' ? `<button class="secondary" onclick="loaders.space_action('${s.space_id}','reject')">Reject</button>` : ''}
          ${s.status === 'active'  ? `<button class="danger" onclick="loaders.space_action('${s.space_id}','ban')">Ban</button>` : ''}
          ${s.status === 'banned'  ? `<button class="secondary" onclick="loaders.space_action('${s.space_id}','unban')">Unban</button>` : ''}
        </td>
      </tr>`).join("") || `<tr><td colspan="5" class="muted">No spaces.</td></tr>`;
  },
  async space_action(id, action) {
    await api("POST", `/admin/api/spaces/${encodeURIComponent(id)}/${action}`);
    await loaders.spaces_filter("");
  },

  async reports() {
    const v = $("view-reports");
    v.innerHTML = `<h2>Fraud reports</h2>
      <table><thead><tr>
        <th>Target</th><th>Category</th><th>Reporter</th>
        <th>Created</th><th></th></tr></thead>
        <tbody id="reports-tbody"></tbody></table>`;
    const list = await api("GET", "/admin/api/reports?status=pending");
    $("reports-tbody").innerHTML = list.map(r => `
      <tr>
        <td><strong>${r.target_type}</strong> ${r.target_id}
            ${r.notes ? `<div class="muted">${r.notes}</div>` : ''}</td>
        <td>${r.category}</td>
        <td style="font-family:monospace">${r.reporter_instance_id}</td>
        <td><time>${new Date(r.created_at*1000).toLocaleString()}</time></td>
        <td class="row-actions">
          <button class="secondary" onclick="loaders.report_action('${r.id}','dismiss')">Dismiss</button>
          <button class="danger"    onclick="loaders.report_action('${r.id}','ban_target')">Ban target</button>
          ${r.target_type === 'space'
            ? `<button class="danger" onclick="loaders.report_action('${r.id}','ban_instance')">Ban instance</button>`
            : ''}
        </td>
      </tr>`).join("") || `<tr><td colspan="5" class="muted">No pending reports.</td></tr>`;
  },
  async report_action(id, action) {
    await api("POST", `/admin/api/reports/${encodeURIComponent(id)}/review`,
              { action });
    await loaders.reports();
  },

  async appeals() {
    const v = $("view-appeals");
    v.innerHTML = `<h2>Appeals</h2>
      <table><thead><tr>
        <th>Target</th><th>Message</th><th>Filed</th><th></th></tr></thead>
        <tbody id="appeals-tbody"></tbody></table>`;
    const list = await api("GET", "/admin/api/appeals?status=pending");
    $("appeals-tbody").innerHTML = list.map(a => `
      <tr>
        <td><strong>${a.target_type}</strong> ${a.target_id}</td>
        <td>${a.message || '<span class="muted">(no message)</span>'}</td>
        <td><time>${new Date(a.created_at*1000).toLocaleString()}</time></td>
        <td class="row-actions">
          <button class="primary" onclick="loaders.appeal_action('${a.id}','lift')">Lift ban</button>
          <button class="secondary" onclick="loaders.appeal_action('${a.id}','dismiss')">Dismiss</button>
        </td>
      </tr>`).join("") || `<tr><td colspan="4" class="muted">No pending appeals.</td></tr>`;
  },
  async appeal_action(id, action) {
    await api("POST", `/admin/api/appeals/${encodeURIComponent(id)}/decide`,
              { action });
    await loaders.appeals();
  },

  async policy() {
    const v = $("view-policy");
    const p = await api("GET", "/admin/api/policy");
    v.innerHTML = `<h2>Policy</h2>
      <div class="field"><label>
        <input type="checkbox" id="p-acc" ${p.auto_accept_clients ? 'checked':''} />
        Auto-accept new clients</label></div>
      <div class="field"><label>
        <input type="checkbox" id="p-acs" ${p.auto_accept_spaces ? 'checked':''} />
        Auto-accept new global spaces</label></div>
      <div class="field"><label>Fraud threshold (distinct reporters before auto-ban)
        <input type="number" id="p-ft" min="1" value="${p.fraud_threshold}"></label></div>
      <button class="primary" onclick="loaders.policy_save()">Save</button>`;
  },
  async policy_save() {
    await api("PATCH", "/admin/api/policy", {
      auto_accept_clients: $("p-acc").checked,
      auto_accept_spaces:  $("p-acs").checked,
      fraud_threshold:     parseInt($("p-ft").value, 10),
    });
    await loaders.policy();
  },

  async branding() {
    const v = $("view-branding");
    const b = await api("GET", "/admin/api/branding");
    v.innerHTML = `<h2>Branding</h2>
      <div class="field"><label>Server name
        <input id="b-name" value="${b.server_name.replace(/"/g,'&quot;')}" /></label></div>
      <div class="field"><label>Landing markdown
        <textarea id="b-md">${b.landing_markdown || ''}</textarea></label></div>
      <div class="field"><label>Header image filename
        <input id="b-img" value="${b.header_image_file || ''}" /></label></div>
      <button class="primary" onclick="loaders.branding_save()">Save</button>`;
  },
  async branding_save() {
    await api("PATCH", "/admin/api/branding", {
      server_name:       $("b-name").value,
      landing_markdown:  $("b-md").value,
      header_image_file: $("b-img").value,
    });
    await loaders.branding();
  },

  async audit() {
    const v = $("view-audit");
    v.innerHTML = `<h2>Admin audit log</h2><div id="audit-list"></div>`;
    const rows = await api("GET", "/admin/api/audit?limit=200");
    $("audit-list").innerHTML = rows.map(r => `
      <div class="audit-row">
        <strong>${r.action}</strong>
        ${r.target_type ? `· <em>${r.target_type}</em> ${r.target_id}` : ''}
        <br><time>${new Date(r.created_at*1000).toLocaleString()}</time>
        · from ${r.admin_ip || 'unknown'}
      </div>`).join("") || `<div class="muted">No audit entries yet.</div>`;
  },
};

// Boot
(async () => {
  // Check session by probing overview.
  try {
    await api("GET", "/admin/api/overview");
    bootApp();
  } catch {
    showLogin();
  }
})();
</script>
</body>
</html>
